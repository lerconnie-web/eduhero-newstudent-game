<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英雄教育 新生闯关地图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif; background: #F1EFE8; color: #2B1B4A; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  button { font-family: inherit; border: none; cursor: pointer; }
  .frame { width: 100%; max-width: 720px; background: #fff; border-radius: 20px; box-shadow: 0 2px 20px rgba(43,27,74,0.12); overflow: hidden; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #3403B4; color: #EEEDFE; }
  .topbar-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .stamp-badge { display: flex; align-items: center; gap: 5px; background: #412402; color: #FAEEDA; padding: 5px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .reset-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; }
  .reset-btn svg { width: 15px; height: 15px; }
  .stage { position: relative; height: 420px; background: #FFFDF9; }
  #mapWrap { position: absolute; inset: 0; overflow-x: auto; overflow-y: hidden; }
  #mapView { position: relative; height: 420px; }
  .node-btn { all: unset; cursor: pointer; position: absolute; width: 60px; height: 88px; text-align: center; }
  .node-circle { position: relative; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
  .node-btn:hover .node-circle { transform: scale(1.06); }
  .node-circle svg { width: 26px; height: 26px; }
  .node-label { margin-top: 5px; font-size: 11px; line-height: 1.3; }
  .node-badge { position: absolute; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .level-view, .win-view { display: none; position: absolute; inset: 0; background: #fff; padding: 18px; overflow-y: auto; }
  .win-view { align-items: center; justify-content: center; flex-direction: column; text-align: center; }
  .level-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .back-btn { width: 34px; height: 34px; border-radius: 50%; background: #F1EFE8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .back-btn svg { width: 16px; height: 16px; }
  .level-title { font-size: 15px; font-weight: 700; }
  .task-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; }
  .task-card { border-radius: 14px; padding: 12px; }
  .task-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .task-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .task-icon svg { width: 14px; height: 14px; }
  .task-card-title { font-size: 12.5px; font-weight: 700; flex: 1; }
  .task-btn { width: 100%; padding: 8px 6px; border-radius: 10px; background: #fff; font-size: 12px; font-weight: 700; }
  .task-detail { font-size: 12px; line-height: 1.6; }
  .primary-btn { background: #3403B4; color: #EEEDFE; padding: 10px 26px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .ghost-btn { background: #F1EFE8; color: #2B1B4A; padding: 8px 18px; border-radius: 20px; font-size: 12.5px; font-weight: 700; }
  .quiz-opt { display: block; width: 100%; text-align: left; padding: 12px 14px; border-radius: 12px; background: #F1EFE8; font-size: 13px; margin-bottom: 8px; }
  .quiz-opt.correct { background: #C0DD97; }
  .quiz-opt.wrong { background: #F7C1C1; }
  .pw-tile { display: inline-flex; align-items: center; justify-content: center; width: 78px; height: 60px; border-radius: 12px; background: #EEEDFE; margin: 0 6px 10px; font-size: 13px; font-weight: 700; color: #3A2296; cursor: pointer; }
  .pw-answer { background: #F1EFE8; border-radius: 12px; padding: 10px 14px; font-size: 15px; font-weight: 700; text-align: center; letter-spacing: 1px; min-height: 20px; }
</style>
</head>

<div class="frame">
  <div class="topbar">
    <div class="topbar-title" id="mascotIconSlot">英雄闯关地图</div>
    <div class="topbar-right">
      <div class="stamp-badge" id="stampBadge">0 英雄盖章</div>
      <button class="reset-btn" id="resetBtn" aria-label="重新开始"></button>
    </div>
  </div>
  <div class="stage">
    <div id="mapWrap"><div id="mapView" style="padding:24px;font-size:13px;color:#6B5B73;">内容加载中…</div></div>

    <div class="win-view" id="winView"></div>

</div>

var LEVELS = DEFAULT_LEVELS;

function parseCSV(text){
  var rows = [];
  var row = [];
  var field = "";
  var inQuotes = false;
  for (var i = 0; i < text.length; i++){
    var c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if (c === '"'){ inQuotes = true; }
      else if (c === ','){ row.push(field); field = ""; }
      else if (c === '\n'){ row.push(field); field = ""; rows.push(row); row = []; }
      else if (c === '\r'){ /* skip */ }
      else { field += c; }
    }
  }
  if (field.length > 0 || row.length > 0){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.length > 1 || (r[0] && r[0].trim() !== ""); });
}

function rowsToObjects(rows){
  if (!rows || rows.length < 2) return [];
  var header = rows[0].map(function(h){ return h.trim(); });
  var out = [];
  for (var i = 1; i < rows.length; i++){
    var r = rows[i];
    if (!r || r.every(function(v){ return !v || v.trim() === ""; })) continue;
    var obj = {};
    for (var j = 0; j < header.length; j++){ obj[header[j]] = r[j] !== undefined ? r[j] : ""; }
    out.push(obj);
  }
  return out;
}

function buildLevelsFromSheetData(levelsRows, itemsRows){
  var levelObjs = rowsToObjects(levelsRows);
  var itemObjs = rowsToObjects(itemsRows);
  if (levelObjs.length === 0) return null;
  levelObjs.sort(function(a,b){ return parseInt(a.level_index,10) - parseInt(b.level_index,10); });
  var itemsByLevel = {};
  itemObjs.forEach(function(it){
    var li = parseInt(it.level_index, 10);
    if (!itemsByLevel[li]) itemsByLevel[li] = [];
    itemsByLevel[li].push(it);
  });
  Object.keys(itemsByLevel).forEach(function(k){
    itemsByLevel[k].sort(function(a,b){ return parseInt(a.item_index,10) - parseInt(b.item_index,10); });
  });
  var built = [];
  for (var i = 0; i < levelObjs.length; i++){
    var meta = levelObjs[i];
    var items = itemsByLevel[parseInt(meta.level_index,10)] || [];
    var lvl = {
      title: meta.title || ("关卡" + meta.level_index),
      iconName: meta.icon || "star",
      ramp: meta.ramp || "pink",
      type: meta.type || "task",
      reward: parseInt(meta.reward, 10) || 50
    };
    if (lvl.type === "card"){
      lvl.dialogue = items.map(function(it){ return it.field1; }).filter(Boolean);
      if (lvl.dialogue.length === 0) lvl.dialogue = ["欢迎！"];
    } else if (lvl.type === "story"){
      lvl.items = items.map(function(it){ return { letter: it.field1, title: it.field2, desc: it.field3 }; });
      lvl.quote = meta.extra_text || "";
    } else if (lvl.type === "task"){
      lvl.steps = items.map(function(it){ return { title: it.field1, detail: it.field2 }; });
    } else if (lvl.type === "password"){
      lvl.pieces = items.map(function(it){ return it.field1; }).filter(Boolean);
      lvl.intro = meta.extra_text || "";
    } else if (lvl.type === "quiz"){
      lvl.questions = items.map(function(it){
        return { q: it.field1, options: [it.field2, it.field3], answer: parseInt(it.field4, 10) || 0, explain: it.field5 };
      });
    }
    built.push(lvl);
  }
  return built;
}

function fetchSheetCSV(sheetId){
  var url = "https://docs.google.com/spreadsheets/d/" + sheetId + "/gviz/tq?tqx=out:csv";
  return fetch(url).then(function(res){
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.text();
  }).then(parseCSV);
}

function loadLevelsFromSheetOrDefault(){
  if (!SHEET_IDS.levels || !SHEET_IDS.items){
    return Promise.resolve({ levels: DEFAULT_LEVELS, source: "内置默认内容" });
  }
  return Promise.all([fetchSheetCSV(SHEET_IDS.levels), fetchSheetCSV(SHEET_IDS.items)])
    .then(function(res){
      var built = buildLevelsFromSheetData(res[0], res[1]);
      if (built && built.length > 0) return { levels: built, source: "Google Sheet" };
      return { levels: DEFAULT_LEVELS, source: "内置默认内容（表格为空）" };
    })
    .catch(function(e){
      return { levels: DEFAULT_LEVELS, source: "内置默认内容（读取表格失败，可能是网络或分享权限问题）" };
    });
}

function loadProgress(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      var saved = JSON.parse(raw);
      if (saved && saved.state && saved.state.length === LEVELS.length){
        state = saved.state; stamps = saved.stamps || 0; return;
      }
    }
  } catch(e){}
  state = LEVELS.map(function(_, i){ return i === 0 ? "current" : "locked"; });
  stamps = 0;
}
function saveProgress(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({state:state, stamps:stamps})); } catch(e){}
}
function resetProgress(){
  state = LEVELS.map(function(_, i){ return i === 0 ? "current" : "locked"; });

  var lv = LEVELS[idx];
  var flipped = [false, false, false];
  function draw(){
    var cards = '<div style="display:flex;gap:10px;justify-content:center;margin:16px 0;">';
    for (var i = 0; i < lv.items.length; i++){
      var it = lv.items[i];
      if (flipped[i]){
        cards += '<div style="width:100px;background:' + RAMPS[lv.ramp].bg + ';border-radius:14px;padding:10px 8px;text-align:center;">' +
          '<div style="font-size:10.5px;font-weight:700;color:' + RAMPS[lv.ramp].dark + ';">' + it.title + '</div>' +
          '<div style="font-size:10.5px;color:' + RAMPS[lv.ramp].dark + ';margin-top:5px;line-height:1.5;">' + it.desc + '</div></div>';
      } else {
        cards += '<button class="story-card" data-i="' + i + '" style="all:unset;cursor:pointer;width:100px;height:88px;background:' + RAMPS[lv.ramp].mid + ';border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;">' + it.letter + '</button>';
      }
    }
    cards += '</div>';
    var allFlipped = flipped.every(function(v){ return v; });
    var quoteBlock = allFlipped ? '<div style="background:#F1EFE8;border-radius:12px;padding:12px 16px;font-size:12.5px;line-height:1.7;text-align:center;max-width:360px;margin:0 auto 16px;">' + lv.quote + '</div><button class="primary-btn" id="storyDoneBtn" style="display:block;margin:0 auto;">继续</button>' : '<p style="text-align:center;font-size:12px;color:#B4B2A9;">点开全部卡片，看看AAT代表什么</p>';
    el("levelView").innerHTML = levelHead(idx) + cards + quoteBlock;
    bindBack();
    var sc = el("levelView").querySelectorAll(".story-card");
    for (var k = 0; k < sc.length; k++){
      sc[k].addEventListener("click", function(){ flipped[parseInt(this.getAttribute("data-i"),10)] = true; draw(); });
    }
    if (allFlipped){ el("storyDoneBtn").addEventListener("click", function(){ completeLevel(idx); }); }
  }
  draw();
}

function renderTaskLevel(idx){
  var lv = LEVELS[idx];
  var done = lv.steps.map(function(){ return false; });
  function draw(){
    var cards = '<div class="task-grid">';
    for (var i = 0; i < lv.steps.length; i++){
      var s = lv.steps[i];
      var r = RAMPS[lv.ramp];
      cards += '<div class="task-card" style="background:' + r.bg + ';">' +
        '<div class="task-card-head"><div class="task-icon" style="background:' + r.mid + ';">' + icon(lv.iconName, "#fff") + '</div><div class="task-card-title" style="color:' + r.dark + ';">' + s.title + '</div>' +
        (done[i] ? icon("check", "#3B6D11") : '') + '</div>' +
        (done[i] ? '<div class="task-detail" style="color:' + r.dark + ';">' + s.detail + '</div>' : '<button class="task-btn step-btn" data-i="' + i + '">点一下看看</button>') +
        '</div>';
    }
    cards += '</div>';
    el("levelView").innerHTML = levelHead(idx) + cards;
    bindBack();
    var sb = el("levelView").querySelectorAll(".step-btn");
    for (var k = 0; k < sb.length; k++){
      sb[k].addEventListener("click", function(){
        done[parseInt(this.getAttribute("data-i"),10)] = true;
        draw();
        if (done.every(function(v){ return v; })){ setTimeout(function(){ completeLevel(idx); }, 500); }
      });
    }
  }
  draw();
}

function renderPasswordLevel(idx){
  var lv = LEVELS[idx];
  var revealed = lv.pieces.map(function(){ return false; });
  function draw(){
    var tiles = "";
    for (var i = 0; i < lv.pieces.length; i++){
      tiles += '<div class="pw-tile pw-tile-btn" data-i="' + i + '" style="' + (revealed[i] ? "background:#E1F5EE;color:#04342C;" : "") + '">' + (revealed[i] ? lv.pieces[i] : "点击查看") + '</div>';
    }
    var allRevealed = revealed.every(function(v){ return v; });
    var answer = allRevealed ? lv.pieces.join("") : "?";
    el("levelView").innerHTML = levelHead(idx) +
      '<p style="font-size:12.5px;line-height:1.7;color:#5F5E5A;margin-bottom:12px;">' + lv.intro + '</p>' +
      '<div style="text-align:center;">' + tiles + '</div>' +
      '<div style="margin:14px 0;"><div style="font-size:11.5px;color:#B4B2A9;margin-bottom:6px;">合并后的答案</div><div class="pw-answer">' + answer + '</div></div>' +
      (allRevealed ? '<button class="primary-btn" id="pwDoneBtn" style="display:block;margin:0 auto;">提交答案</button>' : '');
    bindBack();
    var tl = el("levelView").querySelectorAll(".pw-tile-btn");
    for (var k = 0; k < tl.length; k++){
      tl[k].addEventListener("click", function(){ revealed[parseInt(this.getAttribute("data-i"),10)] = true; draw(); });
    }
    if (allRevealed){ el("pwDoneBtn").addEventListener("click", function(){ completeLevel(idx); }); }
  }
  draw();
}

function renderQuizLevel(idx){
  var lv = LEVELS[idx];
  var qi = 0;
  var answered = false;
  function draw(){
    var q = lv.questions[qi];
    var optsHtml = "";
    for (var i = 0; i < q.options.length; i++){
      optsHtml += '<button class="quiz-opt quiz-opt-btn" data-i="' + i + '">' + q.options[i] + '</button>';
    }
    el("levelView").innerHTML = levelHead(idx) +
      '<div style="font-size:11.5px;color:#B4B2A9;margin-bottom:6px;">第 ' + (qi+1) + ' / ' + lv.questions.length + ' 题</div>' +
      '<p style="font-size:13.5px;font-weight:700;margin-bottom:12px;">' + q.q + '</p>' +
      '<div id="optsWrap">' + optsHtml + '</div>' +
      '<div id="feedback"></div>';
    bindBack();
    var ob = el("levelView").querySelectorAll(".quiz-opt-btn");
    for (var k = 0; k < ob.length; k++){
      ob[k].addEventListener("click", function(){
        if (answered) return;
        answered = true;
        var chosen = parseInt(this.getAttribute("data-i"),10);
        var buttons = el("levelView").querySelectorAll(".quiz-opt-btn");
        buttons[q.answer].classList.add("correct");
        if (chosen !== q.answer) buttons[chosen].classList.add("wrong");
        el("feedback").innerHTML = '<p style="font-size:12px;line-height:1.6;color:#5F5E5A;margin-top:10px;">' + q.explain + '</p>' +
          '<button class="primary-btn" id="nextQBtn" style="display:block;margin:14px auto 0;">' + (qi < lv.questions.length - 1 ? "下一题" : "完成") + '</button>';
        el("nextQBtn").addEventListener("click", function(){
          if (qi < lv.questions.length - 1){ qi++; answered = false; draw(); }
          else { completeLevel(idx); }
        });
      });
    }
  }
  draw();
}

el("resetBtn").innerHTML = icon("refresh", "#EEEDFE");
el("resetBtn").addEventListener("click", function(){
  if (confirm("要重新开始整个闯关进度吗？")) resetProgress();
});
el("mascotIconSlot").innerHTML = mascotSVG(24) + '<span>英雄闯关地图</span>';
el("mascotIconSlot").style.display = "flex";
el("mascotIconSlot").style.alignItems = "center";
el("mascotIconSlot").style.gap = "6px";

loadLevelsFromSheetOrDefault().then(function(result){
  LEVELS = result.levels;
  var note = document.getElementById("sourceNote");
  if (note) note.textContent = "内容来源：" + result.source;
  loadProgress();
  setStampDisplay();
  renderMap();
});
</script>
</body>
